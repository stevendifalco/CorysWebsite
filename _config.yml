# Site settings
title: Cory Spraker
email: cory.spraker@gmail.com
url: https://coryspraker.netlify.app
description: "multidisciplinary artist whose work draws attention to the delicacy of human form, often expressed through layering and mark making. Caught in moments of solitude or introspection, figures in his work are isolated by light from outside their world; drawing attention to their repose and contemplation. other elements, pulled from nature, refer back to the human figures at the center of each work."
keywords: "art, pen drawings, pet portraits"
skills: "Fine Artist"
meta_author: Spraker Cory

# Google webmaster tools
google_verify:

# https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
bing_verify:

# Contact form:
# - static : pass through formspree.io to validate email sending
# - disqus : replace contact form by disqus thread
# - comment the line below if you want to stick with the default PHP contact form
contact: static

# If you use disqus you need disqus shortname
# https://help.disqus.com/customer/portal/articles/466208
disqus_shortname: myshortname

# Color settings (hex-codes without the leading hash-tag)
color:
  primary: 18bc9c #0xff
  primary-rgb: "24,288,156" #"128,179,255"
  secondary: 2c3e50 #FD6E8A
  secondary-dark: 233140 #A2122F

# Footer settings
footer:
  copyright: Cory Spraker
  location: Location
  social: Around the Web
  credits: Credits

# Social networks usernames (many more available: google-plus, flickr, dribbble, pinterest, instagram, tumblr, linkedin, etc.)
social:
#  - title: twitter
#    url: http://twitter.com/jekyllrb
  - title: facebook
    url: https://www.facebook.com/cory.spraker
  - title: instagram
    url: https://www.instagram.com/corysprakes/?hl=en
  

# Postal address (add as many lines as necessary)
address:
  - line: Hudson Valley, New York

# Credits content
credits: 'Freelancer is a free to use, open source Bootstrap theme created by <a href="http://startbootstrap.com">Start Bootstrap</a>.'

# Build settings
markdown: kramdown
permalink: pretty

#for posts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      permalink: ""
